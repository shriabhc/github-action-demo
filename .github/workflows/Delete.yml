name: Delete Files or Folders

on:
  workflow_dispatch:  # Manual trigger
  # push:
  #   branches: [ main ]

jobs:
  delete-items:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Delete files and folders
        run: |
          echo "Deleting specified files/folders..."

          # Add paths to delete below
          rm -rf path/to/file1.txt
          rm -rf path/to/folder1
          rm -rf path/to/file2.log
          rm -rf path/to/folder2

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -A
          git commit -m "Remove specified files and folders" || echo "No changes to commit"
          git push
