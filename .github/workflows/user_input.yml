name: Test User Input Variable

on:
  workflow_dispatch:
    inputs:
      number1:
        description: "First_number"
        default: '0'
        required: true
      number2:
        description: "second_number"
        default: '0'
        required: true
jobs:
  add_numbers:
    runs-on: ubuntu-latest

    steps:
      - name: add nunbers
        id: sum
        run: echo "::set.output name=sum::$((${{ inputs.number1 }} + ${{ inputs.number2 }}))"

      - name: Dispaly sum
        run: echo "The sum of ${{ inputs.number1 }}  and ${{ inputs.number2 }} is ${{ steps.sum.outputs.sum }}"
     
